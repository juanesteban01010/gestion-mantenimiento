{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud Mantenimiento</title>
    <!-- ======= Styles ====== -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <!-- =============== Navigation ================ -->
    <div class="container">
        <div class="navigation">
            <ul>
                <li>
                    <a href="#">
                        <span class="icon">
                            <ion-icon name="ice-cream-outline"></ion-icon>
                        </span>
                        <span class="title">mimo's</span>
                    </a>
                </li>

                <li>
                    <a href="#">
                        <span class="icon">
                            <ion-icon name="home-outline"></ion-icon>
                        </span>
                        <span class="title">Dashboard</span>
                    </a>
                </li>

                <li>
                    <a href="{% url 'crear_solicitud' %}">
                        <span class="icon">
                            <ion-icon name="create-outline"></ion-icon>
                        </span>
                        <span class="title">Solicitud de Ot</span>
                    </a>
                </li>

                <li>
                    <a href="{% url 'gestion_ot' %}">
                        <span class="icon">
                            <ion-icon name="document-text-outline"></ion-icon>
                        </span>
                        <span class="title">Gestion de Ot</span>
                    </a>
                </li>

                <li>
                    <a href="#">
                        <span class="icon">
                            <ion-icon name="layers-outline"></ion-icon>
                        </span>
                        <span class="title">Activos</span>
                    </a>
                </li>

                <li>
                    <a href="#">
                        <span class="icon">
                            <ion-icon name="people-outline"></ion-icon>
                        </span>
                        <span class="title">Recurso humano</span>
                    </a>
                </li>

                <li>
                    <a href="{% url 'listar_ot' %}">
                        <span class="icon">
                            <ion-icon name="lock-closed-outline"></ion-icon>
                        </span>
                        <span class="title">Actividades</span>
                    </a>
                </li>

                <li>
                    <a href="#">
                        <span class="icon">
                            <ion-icon name="log-out-outline"></ion-icon>
                        </span>
                        <span class="title">Sign Out</span>
                    </a>
                </li>
            </ul>
        </div>
        
        
     <!-- ========================= Main ==================== -->
    <div class="main">
        <div class="topbar">
            <div class="toggle">
                <ion-icon name="menu-outline"></ion-icon>
            </div>

            <div class="search">
                <label>
                    <input type="text" placeholder="Search here">
                    <ion-icon name="search-outline"></ion-icon>
                </label>
            </div>

            <div class="user">
                <img src="#" alt="">
            </div>
        </div>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <input type="text" id="creado-por" name="creado_por" placeholder=" ">
            <label for="creado-por">Creado por</label>
        </div>
        <div class="form-group">
            <textarea id="descripcion_problema" name="descripcion_problema" rows="2" placeholder=" "></textarea>
            <label for="descripcion_problema">Descripción solicitud</label>
        </div>
        <div class="form-group">
            <input type="date" id="fecha-creacion" name="fecha_creacion" placeholder=" ">
            <label for="fecha-creacion">Fecha de creación</label>
        </div>
        <div class="form-group">
            <input type="time" id="hora-creacion" name="hora_creacion" placeholder=" ">
            <label for="hora-creacion">Hora de creación</label>
        </div>
        <div class="form-group">
            <textarea id="observaciones" name="observaciones" rows="2" placeholder=" "></textarea>
            <label for="observaciones">Observaciones</label>
        </div>
        <div class="form-group">
            <input type="text" id="solicitado_por" name="solicitado_por" placeholder="">
            <label for="solicitado_por">Solicitado por</label>
        </div>
        <div class="form-group">
            <input type="email" id="email-solicitante" name="email_solicitante" placeholder="">
            <label for="email-solicitante">Email del solicitante</label>
        </div>
        <div class="form-group">
            <input type="text" id="PDV" name="PDV" placeholder="">
            <label for="PDV">PDV</label>
        </div>
        <div class="form-group">
            <input type="text" id="numero_activo" name="numero_activo" placeholder="">
            <label for="numero_activo">N° de activo fijo</label>
        </div>
        <button type="submit">Enviar</button>
    </form>
    


    <!-- =========== Scripts =========  -->
    <script src="{% static 'js/main.js' %}"></script>

    <!-- ====== ionicons ======= -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>

</html>
