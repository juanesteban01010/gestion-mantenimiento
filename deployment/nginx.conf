# Configuración de Nginx para gestion_mantenimiento
# Copia este archivo a /etc/nginx/sites-available/gestion_mantenimiento
# Luego: sudo ln -s /etc/nginx/sites-available/gestion_mantenimiento /etc/nginx/sites-enabled/
# Reinicia: sudo systemctl reload nginx

server {
    listen 80;
    server_name tu-dominio.com;  # Cambia por tu dominio o IP

    location = /favicon.ico { access_log off; log_not_found off; }

    location /static/ {
        alias /ruta/a/tu/proyecto/staticfiles/;  # Cambia por la ruta absoluta a staticfiles
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/ruta/a/tu/proyecto/gestion_mantenimiento.sock;  # Cambia por la ruta al socket de gunicorn
    }
}